  title: "AURA: Adaptive Uncertainty-aware Refinement for LLM-as-a-Judge Auditing."
  authors: "Zilong Zhang,<strong> Noah Yi-Ting Hung</strong>, Weiyi He, Lei Ding, Junxi Chang, Chi-Kuang Yeh."
  status: "Submitted"
  venue: "arXiv 2026"
  tags:
    - llm
